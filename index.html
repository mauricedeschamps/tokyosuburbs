<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Nature Spots near Tokyo</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#1e1e2f">
  <meta name="description" content="Прекрасные природные места недалеко от Токио">
  <link rel="apple-touch-icon" href="icons/icon-192.jpg">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      transition: background-color 0.3s ease, color 0.2s ease, border-color 0.2s ease;
    }

    /* Light / Dark テーマ変数 */
    :root {
      --bg: #121212;
      --surface: #1e1e2e;
      --card: #2a2a3a;
      --text: #f0f0f0;
      --text-secondary: #b0b0c0;
      --border: #3a3a4a;
      --accent: #6c5ce7;
      --accent-hover: #5a4ad7;
      --button-bg: #2d2d3d;
      --shadow: rgba(0,0,0,0.3);
    }
    body.light {
      --bg: #f5f5f7;
      --surface: #ffffff;
      --card: #ffffff;
      --text: #1a1a2e;
      --text-secondary: #4a4a5a;
      --border: #dddde3;
      --accent: #5a4ad7;
      --accent-hover: #4a3bc7;
      --button-bg: #e9e9ef;
      --shadow: rgba(0,0,0,0.05);
    }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
      line-height: 1.5;
      padding: 0;
      margin: 0;
    }

    .app {
      max-width: 1200px;
      margin: 0 auto;
      padding: 1rem;
    }

    /* Header */
    header {
      margin-bottom: 2rem;
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--border);
    }
    h1 {
      font-size: 1.8rem;
      font-weight: 600;
      background: linear-gradient(135deg, var(--accent), #a29bfe);
      background-clip: text;
      -webkit-background-clip: text;
      color: transparent;
    }
    .controls {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    button {
      background-color: var(--button-bg);
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 2rem;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      color: var(--text);
      border: 1px solid var(--border);
      transition: 0.2s;
    }
    button:hover {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }
    .lang-active {
      background-color: var(--accent);
      color: white;
      border-color: var(--accent);
    }

    /* Cards Grid */
    .spots-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.8rem;
      margin: 2rem 0;
    }
    .card {
      background-color: var(--card);
      border-radius: 1.5rem;
      overflow: hidden;
      box-shadow: 0 8px 20px var(--shadow);
      transition: transform 0.2s, box-shadow 0.2s;
      cursor: pointer;
      border: 1px solid var(--border);
    }
    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 28px var(--shadow);
    }
    .card-img {
      width: 100%;
      height: 180px;
      object-fit: cover;
      background: #555;
    }
    .card-content {
      padding: 1.2rem;
    }
    .card-title {
      font-size: 1.4rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    .card-desc {
      font-size: 0.9rem;
      color: var(--text-secondary);
      margin-bottom: 1rem;
    }
    .detail-link {
      font-weight: 500;
      color: var(--accent);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
    }

    /* Detail Page */
    .detail-container {
      background-color: var(--surface);
      border-radius: 2rem;
      padding: 1.5rem;
      margin: 1rem 0 2rem;
      border: 1px solid var(--border);
    }
    .detail-img {
      width: 100%;
      max-height: 450px;
      object-fit: cover;
      border-radius: 1.5rem;
      margin-bottom: 1.5rem;
    }
    .detail-title {
      font-size: 2rem;
      margin-bottom: 1rem;
    }
    .detail-desc {
      font-size: 1rem;
      line-height: 1.6;
      margin-bottom: 1.5rem;
      color: var(--text-secondary);
    }
    .official-btn {
      display: inline-block;
      background-color: var(--accent);
      color: white;
      padding: 0.7rem 1.5rem;
      border-radius: 2rem;
      text-decoration: none;
      margin-top: 0.5rem;
      font-weight: 500;
    }
    .back-btn {
      background: var(--button-bg);
      margin-top: 2rem;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    /* Footer */
    footer {
      margin-top: 3rem;
      padding: 1.5rem 0;
      text-align: center;
      border-top: 1px solid var(--border);
      color: var(--text-secondary);
      font-size: 0.85rem;
    }
    footer a {
      color: var(--accent);
      text-decoration: none;
    }
    .hidden {
      display: none;
    }
    @media (max-width: 640px) {
      .app {
        padding: 0.8rem;
      }
      h1 {
        font-size: 1.4rem;
      }
    }
  </style>
</head>
<body>
<div class="app">
  <header>
    <h1 data-i18n="title">🌿 Природа рядом с Токио</h1>
    <div class="controls">
      <button id="langRu" class="lang-active">🇷🇺 Русский</button>
      <button id="langEn">🇬🇧 English</button>
      <button id="langJa">🇯🇵 日本語</button>
      <button id="themeToggle" aria-label="Переключить тему">🌓 Dark/Light</button>
    </div>
  </header>

  <!-- Главная страница (список) -->
  <main id="mainPage">
    <div class="spots-grid" id="spotsGrid"></div>
  </main>

  <!-- Страница деталей (изначально скрыта) -->
  <div id="detailPage" class="hidden">
    <div class="detail-container" id="detailContainer"></div>
    <button class="back-btn" id="backButton">← <span data-i18n="back">Назад к списку</span></button>
  </div>

  <footer>
    <p><span data-i18n="contact">Contact us</span><br>
    <a href="mailto:mementomorikatsu@gmail.com">mementomorikatsu@gmail.com</a></p>
  </footer>
</div>

<script>
  // ---------- 多言語データ ----------
  const translations = {
    ru: {
      title: "🌿 Природа рядом с Токио",
      contact: "Связаться с нами",
      back: "Назад к списку",
      viewDetail: "Подробнее →",
      officialSite: "Перейти на официальный сайт"
    },
    en: {
      title: "🌿 Nature near Tokyo",
      contact: "Contact us",
      back: "Back to list",
      viewDetail: "More →",
      officialSite: "Official website"
    },
    ja: {
      title: "🌿 東京近郊の自然スポット",
      contact: "お問い合わせ",
      back: "一覧に戻る",
      viewDetail: "詳細を見る →",
      officialSite: "公式サイトへ"
    }
  };

  // スポットデータ (各言語の説明, 詳細説明, 画像, 公式URL)
  const spotsData = [
    { id: 0, imageId: 104, officialUrl: "https://www.gotokyo.org/cn/spot/116/index.html",
      name: { ru: "Окутама", en: "Okutama", ja: "奥多摩" },
      shortDesc: { ru: "Горные пейзажи, озеро и живописные мосты", en: "Mountains, lake & scenic bridges", ja: "山、湖、風光明媚な浮橋" },
      fullDesc: { ru: "Окутама — идеальное место для уединения с природой. Озеро Окутама и плавучий мост Мауяма создают незабываемые виды. Всего 2 часа от Токио.", en: "Okutama is perfect for escaping into nature. Okutama Lake and the floating Mayama Bridge offer unforgettable views. Just 2 hours from Tokyo.", ja: "奥多摩は自然の中での静かな逃避行に最適。奥多摩湖と麦山の浮橋は息をのむ景色。都心から約2時間。" }
    },
    { id: 1, imageId: 15, officialUrl: "https://www.nikko-jp.org/",
      name: { ru: "Никко", en: "Nikko", ja: "日光" },
      shortDesc: { ru: "Озеро Тюдзэндзи и водопад Кэгон", en: "Lake Chuzenji & Kegon Falls", ja: "中禅寺湖と華厳の滝" },
      fullDesc: { ru: "Никко славится величественным водопадом Кэгон (97 м) и святилищами. Могучая природа впечатлит каждого.", en: "Nikko is famous for the magnificent Kegon Falls (97m) and shrines. The powerful nature will impress anyone.", ja: "日光は雄大な華厳の滝（97m）と神社で有名。圧倒的な自然は誰もを魅了します。" }
    },
    { id: 2, imageId: 20, officialUrl: "https://www.hakone.or.jp/",
      name: { ru: "Хаконэ", en: "Hakone", ja: "箱根" },
      shortDesc: { ru: "Вид на Фудзи, озеро Аси, долина Овакудани", en: "Mt.Fuji view, Lake Ashi, Owakudani Valley", ja: "富士山ビュー、芦ノ湖、大涌谷" },
      fullDesc: { ru: "Хаконэ — знаменитый курорт с горячими источниками, видами на Фудзи и геотермальной долиной. Расслабьтесь и насладитесь величием.", en: "Hakone is a famous hot spring resort with views of Mt. Fuji and a geothermal valley. Relax and enjoy the grandeur.", ja: "箱根は富士山の眺望と地熱地帯を持つ有名な温泉地。壮大な自然の中でリラックス。" }
    },
    { id: 3, imageId: 30, officialUrl: "https://www.takaotozan.co.jp/",
      name: { ru: "Такао-сан", en: "Mount Takao", ja: "高尾山" },
      shortDesc: { ru: "Лёгкий подъём, вид на Фудзи", en: "Easy climb, Mt.Fuji view", ja: "気軽な登山、富士山眺望" },
      fullDesc: { ru: "Всего час от Синдзюку, канатная дорога и панорама на Фудзи. Идеально для первого знакомства с природой.", en: "Just one hour from Shinjuku, cable car and panoramic Mt.Fuji views. Perfect for a first nature experience.", ja: "新宿から約1時間、ケーブルカーもあり富士山の絶景。自然体験の最初の一歩に。" }
    },
    { id: 4, imageId: 42, officialUrl: "https://www.enoshima-jinja.or.jp/",
      name: { ru: "Эносима", en: "Enoshima", ja: "江の島" },
      shortDesc: { ru: "Остров, океан, вид на Фудзи", en: "Island, ocean, Fuji view", ja: "島、海、富士山ビュー" },
      fullDesc: { ru: "Живописный остров в часе от Токио. Маяк, пещеры и закаты над Фудзи покорят сердце.", en: "A scenic island one hour from Tokyo. The lighthouse, caves, and sunsets over Fuji will capture your heart.", ja: "都心から1時間の風光明媚な島。灯台、洞窟、富士山の夕日が心を奪います。" }
    },
    { id: 5, imageId: 60, officialUrl: "https://www.kamakura-burabura.com/",
      name: { ru: "Камакура", en: "Kamakura", ja: "鎌倉" },
      shortDesc: { ru: "Храмы, пляж, вид на Эносиму и Фудзи", en: "Temples, beach, Enoshima & Fuji view", ja: "寺院、ビーチ、江ノ島と富士山の眺望" },
      fullDesc: { ru: "Древняя столица самураев. Пляж Юигахама и вид на Фудзи с холмов дают умиротворение.", en: "Ancient samurai capital. Yuigahama beach and Fuji views from the hills bring peace.", ja: "古都鎌倉。由比ヶ浜海岸と丘陵からの富士山眺望で平和を得られます。" }
    },
    { id: 6, imageId: 14, officialUrl: "https://hitachikaihin.jp/",
      name: { ru: "Парк Хитачи", en: "Hitachi Seaside Park", ja: "国営ひたち海浜公園" },
      shortDesc: { ru: "Цветущие холмы, невероятные пейзажи", en: "Flowering hills, incredible landscapes", ja: "花の丘、圧倒的な景観" },
      fullDesc: { ru: "350 гектаров цветов: немофила, козмея. Огромные открытые пространства меняют представление о Японии.", en: "350 hectares of flowers: nemophila, cosmos. Vast open spaces will change your view of Japan.", ja: "350ヘクタールの花々：ネモフィラ、コスモス。広大な開放感で日本のイメージが変わります。" }
    },
    { id: 7, imageId: 77, officialUrl: "https://www.showakinenkoen.go.jp/",
      name: { ru: "Парк Сёва", en: "Showa Memorial Park", ja: "昭和記念公園" },
      shortDesc: { ru: "Гигантская поляна, сезонные цветы", en: "Giant lawn, seasonal flowers", ja: "巨大な広場、四季の花" },
      fullDesc: { ru: "Парк в Токио с огромной лужайкой «Поляна всех». Идеально для пикника и чувства свободы.", en: "A park in Tokyo with the huge 'Minna no Harappa' lawn. Perfect for a picnic and a sense of freedom.", ja: "立川にある広大な「みんなの原っぱ」。ピクニックや自由を感じるのに最適。" }
    }
  ];

  let currentLang = 'ru';   // ロシア語メイン
  let currentTheme = 'dark'; // ダークメイン
  let showingDetail = false;
  let currentSpotId = null;

  // DOM 要素
  const mainPage = document.getElementById('mainPage');
  const detailPage = document.getElementById('detailPage');
  const spotsGrid = document.getElementById('spotsGrid');
  const detailContainer = document.getElementById('detailContainer');
  const backBtn = document.getElementById('backButton');
  const langRuBtn = document.getElementById('langRu');
  const langEnBtn = document.getElementById('langEn');
  const langJaBtn = document.getElementById('langJa');
  const themeToggle = document.getElementById('themeToggle');

  // テーマ設定
  function setTheme(theme) {
    if (theme === 'light') {
      document.body.classList.add('light');
    } else {
      document.body.classList.remove('light');
    }
    localStorage.setItem('theme', theme);
    currentTheme = theme;
  }
  function toggleTheme() {
    setTheme(currentTheme === 'dark' ? 'light' : 'dark');
  }

  // 言語切り替え
  function updateUITexts() {
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.getAttribute('data-i18n');
      if (translations[currentLang][key]) {
        if (el.tagName === 'H1') el.textContent = translations[currentLang][key];
        else if (el.tagName === 'SPAN') el.textContent = translations[currentLang][key];
        else el.textContent = translations[currentLang][key];
      }
    });
    // ボタンのアクティブ表示
    langRuBtn.classList.toggle('lang-active', currentLang === 'ru');
    langEnBtn.classList.toggle('lang-active', currentLang === 'en');
    langJaBtn.classList.toggle('lang-active', currentLang === 'ja');
    // 再描画
    if (!showingDetail) {
      renderMainList();
    } else {
      renderDetailView(currentSpotId);
    }
  }

  function setLanguage(lang) {
    currentLang = lang;
    localStorage.setItem('language', lang);
    updateUITexts();
  }

  // メインリスト描画
  function renderMainList() {
    spotsGrid.innerHTML = '';
    spotsData.forEach(spot => {
      const card = document.createElement('div');
      card.className = 'card';
      const imgUrl = `https://picsum.photos/id/${spot.imageId}/400/280`;
      card.innerHTML = `
        <img class="card-img" src="${imgUrl}" alt="${spot.name[currentLang]}" loading="lazy">
        <div class="card-content">
          <div class="card-title">${spot.name[currentLang]}</div>
          <div class="card-desc">${spot.shortDesc[currentLang]}</div>
          <a href="#" class="detail-link" data-id="${spot.id}">${translations[currentLang].viewDetail}</a>
        </div>
      `;
      const detailLink = card.querySelector('.detail-link');
      detailLink.addEventListener('click', (e) => {
        e.preventDefault();
        showDetail(spot.id);
      });
      spotsGrid.appendChild(card);
    });
  }

  // 詳細表示
  function showDetail(spotId) {
    currentSpotId = spotId;
    showingDetail = true;
    mainPage.classList.add('hidden');
    detailPage.classList.remove('hidden');
    renderDetailView(spotId);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function renderDetailView(spotId) {
    const spot = spotsData.find(s => s.id === spotId);
    if (!spot) return;
    const imgUrl = `https://picsum.photos/id/${spot.imageId}/800/500`;
    detailContainer.innerHTML = `
      <img class="detail-img" src="${imgUrl}" alt="${spot.name[currentLang]}">
      <h2 class="detail-title">${spot.name[currentLang]}</h2>
      <p class="detail-desc">${spot.fullDesc[currentLang]}</p>
      <a href="${spot.officialUrl}" target="_blank" rel="noopener noreferrer" class="official-btn">${translations[currentLang].officialSite} ↗</a>
    `;
    // バックボタン文言更新
    const backSpan = document.querySelector('#backButton span');
    if (backSpan) backSpan.textContent = translations[currentLang].back;
  }

  function backToList() {
    showingDetail = false;
    detailPage.classList.add('hidden');
    mainPage.classList.remove('hidden');
    renderMainList();
  }

  // 言語・テーマ初期化とローカルストレージ
  function initThemeAndLang() {
    const savedTheme = localStorage.getItem('theme');
    if (savedTheme === 'light') {
      setTheme('light');
    } else {
      setTheme('dark');
    }
    const savedLang = localStorage.getItem('language');
    if (savedLang === 'en') setLanguage('en');
    else if (savedLang === 'ja') setLanguage('ja');
    else setLanguage('ru');
  }

  // イベントリスナー
  backBtn.addEventListener('click', backToList);
  langRuBtn.addEventListener('click', () => setLanguage('ru'));
  langEnBtn.addEventListener('click', () => setLanguage('en'));
  langJaBtn.addEventListener('click', () => setLanguage('ja'));
  themeToggle.addEventListener('click', toggleTheme);

  // PWA 登録用 Service Worker
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      navigator.serviceWorker.register('sw.js').then(reg => {
        console.log('SW registered: ', reg);
      }).catch(err => {
        console.log('SW registration failed: ', err);
      });
    });
  }

  // スタート
  initThemeAndLang();
  renderMainList();
</script>
</body>
</html>
